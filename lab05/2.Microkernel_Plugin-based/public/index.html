<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroCMS — Kien truc Microkernel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0f14;
    --surface: #13161d;
    --border:  #1f2330;
    --border2: #2a2f3d;
    --text:    #e2e6f0;
    --muted:   #6b7280;
    --accent:  #5b8dee;
    --green:   #10b981;
    --amber:   #f59e0b;
    --purple:  #6366f1;
    --red:     #ef4444;
    --radius:  8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 220px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 0; overflow-y: auto;
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.5px; color: var(--text); }
  .sidebar-logo .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }

  .nav { padding: 12px 8px; flex: 1; }
  .nav-section { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); padding: 8px 10px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius); cursor: pointer;
    color: var(--muted); font-size: 13px; font-weight: 400;
    transition: all 0.15s; margin-bottom: 1px;
  }
  .nav-item:hover { background: var(--border); color: var(--text); }
  .nav-item.active { background: rgba(91,141,238,0.12); color: var(--accent); font-weight: 500; }
  .nav-item .icon { width: 16px; text-align: center; font-size: 15px; }

  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
  .kernel-badge {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2);
    border-radius: var(--radius);
  }
  .kernel-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .kernel-badge span { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--green); }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    height: 56px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; flex-shrink: 0;
  }
  .topbar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
  .topbar-actions { display: flex; gap: 8px; }

  .content-area { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── Cards & Panels ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 14px; }

  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ── Stats ── */
  .stat-card { text-align: center; }
  .stat-value { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 36px; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4a7de0; }
  .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--border); }
  .btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-success { background: rgba(16,185,129,0.1); color: var(--green); border-color: rgba(16,185,129,0.2); }
  .btn-success:hover { background: rgba(16,185,129,0.2); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── Plugin Cards ── */
  .plugin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .plugin-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .plugin-card.active { border-color: rgba(91,141,238,0.3); }
  .plugin-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .plugin-card.active::before { background: var(--plug-color, var(--accent)); }
  .plugin-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .plugin-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .plugin-version { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
  .plugin-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .plugin-footer { display: flex; align-items: center; justify-content: space-between; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 500;
  }
  .badge-active { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
  .badge-inactive { background: rgba(107,114,128,0.12); color: var(--muted); border: 1px solid var(--border); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; }

  /* ── Post List ── */
  .post-list { display: flex; flex-direction: column; gap: 10px; }
  .post-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; transition: border-color 0.15s; cursor: pointer;
  }
  .post-item:hover { border-color: var(--border2); }
  .post-title { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
  .post-meta { display: flex; gap: 10px; flex-wrap: wrap; }
  .post-meta span { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .post-meta .tag {
    background: rgba(99,102,241,0.1); color: var(--purple);
    border: 1px solid rgba(99,102,241,0.2);
    padding: 1px 7px; border-radius: 100px; font-size: 11px;
  }
  .post-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 12px; width: 640px; max-width: 95vw; max-height: 85vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  /* ── Form ── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 9px 12px; color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { height: 180px; resize: vertical; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

  /* ── Toast ── */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 10px 16px; font-size: 13px;
    display: flex; align-items: center; gap: 8px; min-width: 240px;
    animation: slideIn 0.2s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }

  /* ── Feed ── */
  .feed { display: flex; flex-direction: column; gap: 8px; }
  .feed-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px; border-radius: 6px; background: var(--bg); }
  .feed-icon { font-size: 15px; flex-shrink: 0; }
  .feed-text { font-size: 12px; line-height: 1.4; }
  .feed-time { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* ── Log Table ── */
  .log-list { display: flex; flex-direction: column; gap: 6px; }
  .log-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; background: var(--bg); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .log-action { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .log-REGISTER { background: rgba(91,141,238,0.15); color: var(--accent); }
  .log-ACTIVATE { background: rgba(16,185,129,0.15); color: var(--green); }
  .log-DEACTIVATE { background: rgba(245,158,11,0.15); color: var(--amber); }
  .log-plugin { color: var(--text); font-weight: 600; }
  .log-time { color: var(--muted); margin-left: auto; }

  /* ── Rendered Post ── */
  .post-rendered { line-height: 1.7; }
  .post-rendered h1,.post-rendered h2,.post-rendered h3 { font-family: 'Syne', sans-serif; margin: 16px 0 8px; }
  .post-rendered p { margin-bottom: 10px; color: var(--text); }
  .post-rendered code { background: var(--bg); padding: 1px 5px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--amber); }
  .post-rendered pre { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; overflow-x: auto; margin: 12px 0; }
  .post-rendered strong { font-weight: 600; }
  .post-rendered em { color: var(--accent); font-style: italic; }
  .post-rendered blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--muted); margin: 12px 0; }
  .post-rendered ul { padding-left: 20px; margin-bottom: 10px; }
  .post-rendered a { color: var(--accent); text-decoration: none; }

  .seo-badge { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .seo-item { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 11px; }
  .seo-item .seo-key { color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .seo-item .seo-val { color: var(--text); font-weight: 500; }

  .page-indicator { text-align: center; padding: 40px; color: var(--muted); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">MicroCMS</div>
      <div class="tagline">Kien truc Microkernel</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Loi he thong</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <span class="icon">⊞</span> Tong quan
      </div>
      <div class="nav-item" onclick="navigate('posts')" id="nav-posts">
        <span class="icon">📄</span> Noi dung
      </div>
      <div class="nav-section">He thong</div>
      <div class="nav-item" onclick="navigate('plugins')" id="nav-plugins">
        <span class="icon">🔌</span> Plugin
      </div>
      <div class="nav-item" onclick="navigate('analytics')" id="nav-analytics">
        <span class="icon">📊</span> Thong ke
      </div>
      <div class="nav-item" onclick="navigate('logs')" id="nav-logs">
        <span class="icon">📋</span> Nhat ky Kernel
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="kernel-badge">
        <div class="kernel-dot"></div>
        <span>Kernel dang chay</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Tong quan</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content-area" id="content-area">
      <div class="page-indicator">Dang tai…</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Modal</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
const API = '';
let currentPage = 'dashboard';
let allPosts = [];
let allPlugins = [];

// ── Utils ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return r.json();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function timeSince(iso) {
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 60) return `${Math.floor(d)} giay truoc`;
  if (d < 3600) return `${Math.floor(d/60)} phut truoc`;
  return `${Math.floor(d/3600)} gio truoc`;
}

function statusVi(status) {
  return status === 'active' ? 'dang bat' : 'dang tat';
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── Navigation ────────────────────────────────────────────────
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

  const titles = { dashboard: 'Tong quan', posts: 'Quan ly noi dung', plugins: 'Quan ly plugin', analytics: 'Thong ke', logs: 'Nhat ky Kernel' };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';

  const pages = { dashboard: renderDashboard, posts: renderPosts, plugins: renderPlugins, analytics: renderAnalytics, logs: renderLogs };
  (pages[page] || (() => {}))();
}

// ── Dashboard ────────────────────────────────────────────────
async function renderDashboard() {
  const ca = document.getElementById('content-area');
  ca.innerHTML = `<div class="page-indicator">Dang tai…</div>`;

  const [postsData, pluginsData, analyticsData] = await Promise.all([
    api('/api/posts'), api('/api/plugins'), api('/api/analytics')
  ]);

  const posts = postsData.posts || [];
  const plugins = pluginsData.plugins || [];
  const active = plugins.filter(p => p.status === 'active').length;
  const stats = analyticsData.stats || {};

  ca.innerHTML = `
    <div class="grid-3" style="margin-bottom:20px">
      <div class="card stat-card">
        <div class="stat-value" style="color:var(--accent)">${posts.length}</div>
        <div class="stat-label">Tong bai viet</div>
      </div>
      <div class="card stat-card">
        <div class="stat-value" style="color:var(--green)">${active}/${plugins.length}</div>
        <div class="stat-label">Plugin dang bat</div>
      </div>
      <div class="card stat-card">
        <div class="stat-value" style="color:var(--amber)">${stats.views || 0}</div>
        <div class="stat-label">Tong luot xem</div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:20px">
      <div class="card">
        <div class="card-title">Plugin da nap</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${plugins.map(p => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-radius:6px">
              <span style="font-size:13px">${p.displayName}</span>
              <span class="badge ${p.status === 'active' ? 'badge-active' : 'badge-inactive'}">
                <span class="badge-dot" style="background:${p.status === 'active' ? 'var(--green)' : 'var(--muted)'}"></span>
                ${statusVi(p.status)}
              </span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <div class="card-title">Bai viet gan day</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${posts.slice(0,4).map(p => `
            <div style="padding:8px 10px;background:var(--bg);border-radius:6px;cursor:pointer" onclick="viewPost('${p.id}')">
              <div style="font-size:13px;font-weight:500;margin-bottom:2px">${p.title}</div>
              <div style="font-size:11px;color:var(--muted)">${timeSince(p.createdAt)} ${p.readingTime ? '· ' + p.readingTime : ''}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Kien truc Microkernel</div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
        <div style="flex:1;min-width:240px">
          <div style="font-size:12px;color:var(--muted);line-height:1.8">
            <strong style="color:var(--text)">Kernel Core</strong> — event bus, service registry, vong doi plugin<br>
            <strong style="color:var(--text)">Core Services</strong> — ContentStore (luon san sang, khong phai plugin)<br>
            <strong style="color:var(--text)">Plugins</strong> — hook vao event, dang ky service, khong phu thuoc truc tiep vao core
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${['SEO: tao slug + meta', 'Markdown: render HTML', 'Analytics: theo doi su kien'].map(f => `
            <span style="background:rgba(91,141,238,0.1);color:var(--accent);border:1px solid rgba(91,141,238,0.2);padding:4px 10px;border-radius:100px;font-size:11px">${f}</span>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

// ── Posts ────────────────────────────────────────────────────
async function renderPosts() {
  const ca = document.getElementById('content-area');
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = `<button class="btn btn-primary" onclick="openCreatePost()">＋ Tao bai viet</button>`;

  ca.innerHTML = `<div class="page-indicator">Dang tai…</div>`;
  const data = await api('/api/posts');
  allPosts = data.posts || [];

  if (!allPosts.length) {
    ca.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>Chua co bai viet. Hay tao bai dau tien!</div></div>`;
    return;
  }

  ca.innerHTML = `<div class="post-list">
    ${allPosts.map(p => `
      <div class="post-item" onclick="viewPost('${p.id}')">
        <div style="flex:1">
          <div class="post-title">${p.title}</div>
          <div class="post-meta">
            <span>📅 ${new Date(p.createdAt).toLocaleDateString()}</span>
            <span>👁 ${p.views || 0} luot xem</span>
            ${p.readingTime ? `<span>⏱ ${p.readingTime}</span>` : ''}
            ${p.slug ? `<span>🔗 /${p.slug}</span>` : ''}
            ${(p.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </div>
        <div class="post-actions" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-sm" onclick="openEditPost('${p.id}')">Sua</button>
          <button class="btn btn-danger btn-sm" onclick="deletePost('${p.id}')">Xoa</button>
        </div>
      </div>
    `).join('')}
  </div>`;
}

async function viewPost(id) {
  const data = await api(`/api/posts/${id}`);
  const p = data.post;
  if (!p) return;

  const seoSection = (p.slug || p.metaDescription || p.readingTime) ? `
    <hr class="sep">
    <div style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Du lieu tu plugin SEO</div>
    <div class="seo-badge">
      ${p.slug ? `<div class="seo-item"><span class="seo-key">slug</span><span class="seo-val">/${p.slug}</span></div>` : ''}
      ${p.readingTime ? `<div class="seo-item"><span class="seo-key">reading-time</span><span class="seo-val">${p.readingTime}</span></div>` : ''}
      ${p.metaDescription ? `<div class="seo-item" style="width:100%"><span class="seo-key">meta</span><span class="seo-val" style="font-family:'Inter'">${p.metaDescription}</span></div>` : ''}
    </div>
  ` : '';

  const renderedSection = p.renderedHtml ? `
    <hr class="sep">
    <div style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Du lieu tu plugin Markdown</div>
    <div class="post-rendered">${p.renderedHtml}</div>
  ` : `
    <hr class="sep">
    <div class="post-rendered"><p style="color:var(--muted);font-style:italic">Plugin Markdown dang tat — hay bat plugin de xem HTML da render.</p><pre style="background:var(--bg);padding:12px;border-radius:6px;font-size:12px;color:var(--muted)">${p.body}</pre></div>
  `;

  openModal(p.title,
    `<div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
        ${(p.tags||[]).map(t => `<span class="badge" style="background:rgba(99,102,241,0.1);color:var(--purple);border:1px solid rgba(99,102,241,0.2)">${t}</span>`).join('')}
        <span style="font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace">${new Date(p.createdAt).toLocaleString()}</span>
      </div>
      ${seoSection}
      ${renderedSection}
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Dong</button><button class="btn btn-primary" onclick="closeModal();openEditPost('${p.id}')">Sua bai viet</button>`
  );
}

function openCreatePost() {
  openModal('Tao bai viet moi',
    `<div>
      <div class="form-group"><label class="form-label">Tieu de</label><input class="form-input" id="post-title" placeholder="Nhap tieu de bai viet…"></div>
      <div class="form-group"><label class="form-label">Noi dung (Markdown)</label><textarea class="form-textarea" id="post-body" placeholder="Viet bang **Markdown**…"></textarea></div>
      <div class="form-group"><label class="form-label">The (tach bang dau phay)</label><input class="form-input" id="post-tags" placeholder="kien-truc, cms, demo"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Huy</button>
     <button class="btn btn-primary" onclick="submitCreatePost()">Tao bai viet</button>`
  );
  setTimeout(() => document.getElementById('post-title').focus(), 50);
}

async function submitCreatePost() {
  const title = document.getElementById('post-title').value.trim();
  const body = document.getElementById('post-body').value.trim();
  const tags = document.getElementById('post-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  if (!title || !body) { toast('Can nhap tieu de va noi dung', 'error'); return; }
  await api('/api/posts', { method: 'POST', body: JSON.stringify({ title, body, tags }) });
  closeModal();
  toast('Da tao bai viet');
  renderPosts();
}

async function openEditPost(id) {
  const data = await api(`/api/posts/${id}`);
  const p = data.post;
  openModal('Chinh sua bai viet',
    `<div>
      <div class="form-group"><label class="form-label">Tieu de</label><input class="form-input" id="edit-title" value="${p.title.replace(/"/g,'&quot;')}"></div>
      <div class="form-group"><label class="form-label">Noi dung (Markdown)</label><textarea class="form-textarea" id="edit-body">${p.body}</textarea></div>
      <div class="form-group"><label class="form-label">The</label><input class="form-input" id="edit-tags" value="${(p.tags||[]).join(', ')}"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Huy</button>
     <button class="btn btn-primary" onclick="submitEditPost('${id}')">Luu thay doi</button>`
  );
}

async function submitEditPost(id) {
  const title = document.getElementById('edit-title').value.trim();
  const body = document.getElementById('edit-body').value.trim();
  const tags = document.getElementById('edit-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  await api(`/api/posts/${id}`, { method: 'PUT', body: JSON.stringify({ title, body, tags }) });
  closeModal();
  toast('Da cap nhat bai viet');
  renderPosts();
}

async function deletePost(id) {
  if (!confirm('Ban co chac chan muon xoa bai viet nay?')) return;
  await api(`/api/posts/${id}`, { method: 'DELETE' });
  toast('Da xoa bai viet');
  renderPosts();
}

// ── Plugins ──────────────────────────────────────────────────
async function renderPlugins() {
  const ca = document.getElementById('content-area');
  ca.innerHTML = `<div class="page-indicator">Dang tai…</div>`;
  const data = await api('/api/plugins');
  allPlugins = data.plugins || [];

  ca.innerHTML = `
    <div style="margin-bottom:16px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--muted)">
      <strong style="color:var(--text)">Mau Microkernel:</strong> Kernel chi quan ly vong doi plugin. Plugin giao tiep qua event bus va service registry, khong phu thuoc truc tiep vao nhau.
    </div>
    <div class="plugin-grid">
      ${allPlugins.map(p => `
        <div class="plugin-card ${p.status === 'active' ? 'active' : ''}" style="--plug-color:${p.color || 'var(--accent)'}">
          <div class="plugin-header">
            <div>
              <div class="plugin-name">${p.displayName}</div>
              <div class="plugin-version">v${p.version} · by ${p.author}</div>
            </div>
            <span class="badge ${p.status === 'active' ? 'badge-active' : 'badge-inactive'}">
              <span class="badge-dot" style="background:${p.status === 'active' ? 'var(--green)' : 'var(--muted)'}"></span>
              ${statusVi(p.status)}
            </span>
          </div>
          <div class="plugin-desc">${p.description}</div>
          ${p.dependencies?.length ? `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">Phu thuoc: ${p.dependencies.join(', ')}</div>` : ''}
          <div class="plugin-footer">
            <span style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace">${p.name}</span>
            ${p.status === 'active'
              ? `<button class="btn btn-danger btn-sm" onclick="togglePlugin('${p.name}', false)">Tat</button>`
              : `<button class="btn btn-success btn-sm" onclick="togglePlugin('${p.name}', true)">Bat</button>`
            }
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

async function togglePlugin(name, activate) {
  try {
    const endpoint = activate ? '/api/plugins/activate' : '/api/plugins/deactivate';
    await api(endpoint, { method: 'POST', body: JSON.stringify({ name }) });
    toast(`Plugin da ${activate ? 'duoc bat' : 'duoc tat'}`);
    renderPlugins();
  } catch(e) {
    toast(e.message, 'error');
  }
}

// ── Analytics ────────────────────────────────────────────────
async function renderAnalytics() {
  const ca = document.getElementById('content-area');
  ca.innerHTML = `<div class="page-indicator">Dang tai…</div>`;
  const data = await api('/api/analytics');

  if (!data.active) {
    ca.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div>Plugin Analytics dang tat.</div><br><button class="btn btn-primary" onclick="navigate('plugins')">Mo trang Plugin</button></div>`;
    return;
  }

  const { stats, feed, topPosts } = data;

  ca.innerHTML = `
    <div class="grid-3" style="margin-bottom:20px">
      <div class="card stat-card"><div class="stat-value" style="color:var(--amber)">${stats.views}</div><div class="stat-label">Tong luot xem</div></div>
      <div class="card stat-card"><div class="stat-value" style="color:var(--green)">${stats.creates}</div><div class="stat-label">Bai da tao</div></div>
      <div class="card stat-card"><div class="stat-value" style="color:var(--purple)">${stats.updates}</div><div class="stat-label">Lan cap nhat</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Bai viet xem nhieu nhat</div>
        ${topPosts.length ? topPosts.map((p,i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);width:18px">#${i+1}</span>
            <span style="flex:1;font-size:13px">${p.title}</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--amber)">${p.views} luot xem</span>
          </div>
        `).join('') : '<div style="color:var(--muted);font-size:12px">Chua co luot xem nao.</div>'}
      </div>

      <div class="card">
        <div class="card-title">Nhat ky hoat dong</div>
        <div class="feed">
          ${feed.length ? feed.map(f => `
            <div class="feed-item">
              <span class="feed-icon">${f.icon}</span>
              <div>
                <div class="feed-text">${f.action}</div>
                <div class="feed-time">${timeSince(f.timestamp)}</div>
              </div>
            </div>
          `).join('') : '<div style="color:var(--muted);font-size:12px">Chua co hoat dong nao.</div>'}
        </div>
      </div>
    </div>
  `;
}

// ── Logs ─────────────────────────────────────────────────────
async function renderLogs() {
  const ca = document.getElementById('content-area');
  ca.innerHTML = `<div class="page-indicator">Dang tai…</div>`;
  const data = await api('/api/logs');
  const logs = data.logs || [];

  ca.innerHTML = `
    <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--muted)">${logs.length} su kien gan day</span>
      <button class="btn btn-ghost btn-sm" onclick="renderLogs()">↻ Tai lai</button>
    </div>
    <div class="card">
      <div class="log-list">
        ${logs.length ? logs.map(l => `
          <div class="log-item">
            <span class="log-action log-${l.action}">${l.action}</span>
            <span class="log-plugin">${l.plugin}</span>
            <span class="log-time">${timeSince(l.timestamp)}</span>
          </div>
        `).join('') : '<div style="color:var(--muted);font-size:12px;padding:10px">Chua co su kien nao.</div>'}
      </div>
    </div>
  `;
}

// ── Boot ─────────────────────────────────────────────────────
navigate('dashboard');
</script>
</body>
</html>
